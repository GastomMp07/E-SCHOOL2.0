    <style>

    <div class="contenu-principal">
        <div class="carte-accueil animate__animated animate__fadeIn">
            <h2>📅 HORAIRE DE COURS</h2>
            <p id="classe-display">Chargement de votre emploi du temps...</p>
            
            <div id="horaire-container" class="carte-donnees">
                </div>
        </div>

   <script type="module">
    import { auth, db } from "./auth.js";
    // Importe les instances Firebase d'authentification et de base de données depuis auth.js
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    // Importe l'écouteur pour détecter le changement d'état de connexion de l'utilisateur
    import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    // Importe les fonctions de requêtes et de manipulation de documents Firestore

    onAuthStateChanged(auth, async (user) => {
        // Déclenche l'écoute de l'état de l'authentification de l'utilisateur courant
        if (!user) {
            // Si aucun utilisateur n'est connecté à l'application
            window.location.href = "login.html";
            // Redirige immédiatement l'utilisateur vers la page de connexion
            return;
            // Interrompt l'exécution de la fonction d'écoute
        }

        const container = document.getElementById('horaire-container');
        // Récupère l'élément HTML destiné à afficher le planning hebdomadaire
        const displayLabel = document.getElementById('classe-display');
        // Récupère l'élément textuel affichant les détails de la classe ou de l'enseignant

        function normClasse(s) {
            if (!s) return "";
            let str = String(s).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            str = str.replace(/^(\d+)(er|ere|erè|è|eme|emè|em|ème)?\s*/i, "$1 ");
            return str.replace(/[^a-z0-9]/g, "");
        }

        function normText(s) {
            if (!s) return "";
            return String(s).toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
        }

        function extractHoraireFields(h) {
            return {
                id: h.id,
                classe: h.classe || h.class || h.Classe || h.maClasse || "Non définie",
                matiere: h.matiere || h.course || h.Matiere || h.nom || "Matière",
                professeur: h.professeur || h.prof || h.Professeur || h.enseignant || "N/A",
                heure: h.heure || h.horaire || h.Heure || h.plage || "",
                jour: h.jour || h.Jour || "Autre"
            };
        }

        try {
            // 1. Récupérer les infos de l'utilisateur dans "users" et "utilisateurs"
            const snapUsers = await getDoc(doc(db, "users", user.uid));
            const snapUtils = await getDoc(doc(db, "utilisateurs", user.uid));
            
            const u = snapUsers.exists() ? snapUsers.data() : {};
            const v = snapUtils.exists() ? snapUtils.data() : {};

            const userData = { ...v, ...u }; // u a la priorité sur v
            const roleRaw = String(userData.role || "").toLowerCase().trim();
            const isProf = roleRaw === "enseignant" || roleRaw === "professeur" || roleRaw.includes("prof") || roleRaw.includes("teacher");
            const isAdmin = roleRaw === "admin" || roleRaw.includes("direction") || roleRaw.includes("administrateur");

            const userNom = userData.nom || "";
            const userNomNorm = normText(userNom);

            // Extraction multi-champs des classes de l'utilisateur
            let userClasses = [];
            const classSources = [u.classe, u.class, u.maClasse, u.classes, v.classe, v.class, v.maClasse, v.classes];
            classSources.forEach(src => {
                if (Array.isArray(src)) {
                    src.forEach(c => { if (c) userClasses.push(String(c).trim()); });
                } else if (typeof src === "string" && src.trim() !== "") {
                    userClasses.push(src.trim());
                }
            });
            userClasses = Array.from(new Set(userClasses));
            const userClassesNorm = userClasses.map(c => normClasse(c));
            const mainClasse = userClasses[0] || "Toutes";

            // 2. Charger tous les créneaux d'horaires depuis Firestore
            const querySnapshot = await getDocs(collection(db, "horaires"));
            const allHoraires = [];
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if (data) {
                    allHoraires.push(extractHoraireFields({ id: docSnap.id, ...data }));
                }
            });

            container.innerHTML = "";

            if (allHoraires.length === 0) {
                displayLabel.innerText = "Emploi du temps (Base vide)";
                container.innerHTML = `
                    <div style="background: white; padding: 25px; border-radius: 12px; text-align: center; color: #333; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        <h3 style="color: #ef4444; margin-bottom: 10px;">⚠️ Aucun cours dans la base de données</h3>
                        <p style="color: #666; margin-bottom: 15px;">La collection <strong>"horaires"</strong> de Firestore ne contient aucun document pour le moment.</p>
                        <p style="font-size: 0.9em; color: #888;">Pour ajouter un horaire, connectez-vous avec un compte Direction/Admin et rendez-vous dans le menu <strong>"Supervision Direction"</strong> -> section <strong>"Ajouter un créneau d'horaire"</strong>.</p>
                    </div>
                `;
                return;
            }

            // Récupérer la liste unique de toutes les classes enregistrées dans la collection "horaires"
            const classesEnregistreesMap = new Map();
            allHoraires.forEach(h => {
                const key = normClasse(h.classe);
                if (key && !classesEnregistreesMap.has(key)) {
                    classesEnregistreesMap.set(key, h.classe);
                }
            });

            // Titre d'en-tête
            if (isAdmin) {
                displayLabel.innerText = "Emploi du temps Général (Administration)";
            } else if (isProf) {
                displayLabel.innerText = "Planning Enseignant : " + (userNom || "Enseignant");
            } else {
                displayLabel.innerText = "Emploi du temps - Classe : " + (mainClasse || "Élève");
            }

            // Calcul du filtre par défaut "Mes cours"
            let mesCours = [];
            if (isAdmin) {
                mesCours = allHoraires;
            } else if (isProf) {
                mesCours = allHoraires.filter(h => {
                    const profNorm = normText(h.professeur);
                    const classeNorm = normClasse(h.classe);
                    const matchProf = profNorm.includes(userNomNorm) || (userNomNorm.length > 0 && userNomNorm.includes(profNorm));
                    const matchClasse = userClassesNorm.includes(classeNorm);
                    return matchProf || matchClasse;
                });
            } else {
                // Élève : match de classe normalisé
                mesCours = allHoraires.filter(h => {
                    const classeNorm = normClasse(h.classe);
                    return userClassesNorm.includes(classeNorm);
                });
            }

            // Banner d'information
            let noticeHTML = "";
            if (!isAdmin && mesCours.length === 0) {
                noticeHTML = `
                    <div style="background: #fff3cd; color: #856404; padding: 12px 15px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9em; border-left: 4px solid #ffeba2;">
                        ℹ️ Votre classe (<strong>${mainClasse}</strong>) n'a aucun cours correspondant exact dans la base. Affichage de <strong>tous les cours enregistrés (${allHoraires.length})</strong> ci-dessous.
                    </div>
                `;
            }

            // Construction du sélecteur de classe interactif
            let selectorHTML = `
                <div style="margin-bottom: 20px; background: rgba(255,255,255,0.15); padding: 15px; border-radius: 10px; text-align: center;">
                    <div style="color: #e0f2f1; font-size: 0.9em; margin-bottom: 8px;">
                        📊 Total base de données : <strong>${allHoraires.length} cours</strong> au total.
                    </div>
                    <label for="select-filter-classe" style="font-weight: bold; margin-right: 10px; color: #fff;">Sélectionner la classe à afficher :</label>
                    <select id="select-filter-classe" style="padding: 8px 14px; border-radius: 6px; border: 1px solid #0c7489; outline: none; font-size: 0.95em; font-weight: bold; color: #0c5568;">
                        ${(!isAdmin && mesCours.length > 0) ? `<option value="MES_COURS">Mon Emploi du Temps (${userClasses[0] || 'Ma Classe'})</option>` : ''}
                        <option value="TOUTES">Toutes les classes (${allHoraires.length} cours)</option>
                        ${Array.from(classesEnregistreesMap.values()).map(cl => `<option value="${cl}">Classe : ${cl}</option>`).join('')}
                    </select>
                </div>
                ${noticeHTML}
                <div id="horaire-cards-wrapper"></div>
            `;
            container.innerHTML = selectorHTML;

            const filterSelect = document.getElementById('select-filter-classe');
            const wrapper = document.getElementById('horaire-cards-wrapper');

            const renderFilter = (filterValue) => {
                wrapper.innerHTML = "";
                let listToRender = [];

                if (filterValue === "MES_COURS" && mesCours.length > 0) {
                    listToRender = mesCours;
                } else if (filterValue === "TOUTES") {
                    listToRender = allHoraires;
                } else {
                    const targetNorm = normClasse(filterValue);
                    listToRender = allHoraires.filter(h => normClasse(h.classe) === targetNorm);
                }

                if (listToRender.length === 0) {
                    wrapper.innerHTML = `
                        <div style="text-align:center; padding:30px 15px; color:#555; background:white; border-radius:10px; margin-top:15px;">
                            <p style="font-size:1.1em; font-weight:bold;">Aucun cours trouvé pour le filtre "${filterValue}".</p>
                            <p style="font-size:0.9em; color:#777; margin-top:5px;">Veuillez choisir "Toutes les classes" dans le menu déroulant ci-dessus.</p>
                        </div>
                    `;
                    return;
                }

                renderPlanning(listToRender, wrapper, isAdmin, isProf);
            };

            // Sélection par défaut
            if (!isAdmin && mesCours.length === 0) {
                filterSelect.value = "TOUTES";
                renderFilter("TOUTES");
            } else {
                renderFilter(filterSelect.value);
            }

            filterSelect.addEventListener('change', (e) => {
                renderFilter(e.target.value);
            });

        } catch (error) {
            console.error("Erreur Firestore :", error);
            container.innerHTML = "<div style='text-align:center; color:#ef4444; background:white; padding:20px; border-radius:8px;'><strong>Erreur de chargement Firestore :</strong> " + (error.message || error) + "</div>";
        }
    });

    function renderPlanning(items, targetContainer, isAdmin, isProf) {
        const joursOrder = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];
        const planning = {};

        items.forEach(cours => {
            const j = cours.jour || "Autre";
            if (!planning[j]) planning[j] = [];
            planning[j].push(cours);
        });

        const presentDays = [...joursOrder.filter(j => planning[j]), ...Object.keys(planning).filter(j => !joursOrder.includes(j))];

        let htmlContent = "";

        presentDays.forEach(jour => {
            planning[jour].sort((a, b) => (a.heure || "").localeCompare(b.heure || ""));

            htmlContent += `<h3 style="color: #0c5568; margin-top: 25px; border-bottom: 2px solid #0c7489; padding-bottom: 5px;">${jour}</h3>`;
            
            planning[jour].forEach(cours => {
                let detailInfo = `🏫 Classe : <strong>${cours.classe}</strong> &nbsp;|&nbsp; 👨‍🏫 Enseignant : <strong>${cours.professeur}</strong>`;
                if (!isAdmin && !isProf) {
                    detailInfo = `👨‍🏫 Enseignant : <strong>${cours.professeur}</strong>`;
                } else if (isProf) {
                    detailInfo = `🏫 Classe : <strong>${cours.classe}</strong>`;
                }

                htmlContent += `
                    <div class="animate__animated animate__fadeInLeft" style="margin-bottom: 12px; padding: 15px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #0c5568;">
                        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px;">
                            <strong style="font-size: 1.1em; color: #333;">${cours.matiere}</strong>
                            <span style="color: #0c5568; font-weight: bold; background: #e0f2f1; padding: 4px 10px; border-radius: 6px;">${cours.heure}</span>
                        </div>
                        <div style="margin-top: 8px; color: #666; font-size: 0.9em;">
                            ${detailInfo}
                        </div>
                    </div>
                `;
            });
        });

        targetContainer.innerHTML = htmlContent;
    }
    // --- SÉCURITÉ : ANTI-INSPECTION ---
    // Bloquer le clic droit
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    // Empêche l'ouverture du menu contextuel (clic droit) sur toute la page

    // Bloquer les raccourcis clavier (F12, Ctrl+U, Ctrl+Shift+I, etc.)
    document.addEventListener('keydown', (e) => {
        // Écoute chaque touche pressée sur le clavier pour intercepter les raccourcis de développeur
        if (
            e.key === 'F12' || 
            // Vérifie si la touche F12 (ouvre les DevTools) est pressée
            (e.ctrlKey && e.shiftKey && e.key === 'I') || 
            // Vérifie la combinaison Ctrl+Shift+I (ouvre les DevTools)
            (e.ctrlKey && e.shiftKey && e.key === 'J') || 
            // Vérifie la combinaison Ctrl+Shift+J (ouvre la console)
            (e.ctrlKey && e.key === 'u') ||
            // Vérifie Ctrl+U (affiche le code source)
            (e.ctrlKey && e.key === 's')
            // Vérifie Ctrl+S (sauvegarde de la page)
        ) {
            e.preventDefault();
            // Annule l'action par défaut du raccourci clavier détecté
            alert("L'inspection du code est désactivée pour des raisons de sécurité.");
            // Affiche un message expliquant pourquoi l'action est bloquée
            return false;
            // Retourne false pour s'assurer que l'événement est complètement stoppé
        }
    });

</script>
