    <style>
        /* Styles déplacés dans le head pour une meilleure conformité HTML */

            background: linear-gradient(135deg, #071e2b 0%, #0c7489 100%);

/* Groupe de gauche (Menu + Titre) */

        /* VOILE (Le fond noir quand le menu est ouvert) */

            background: rgba(0,0,0,0.5); visibility: hidden; opacity: 0; 
            transition: 0.3s; z-index: 9999; 
        }
        .voile.active { visibility: visible; opacity: 1; }
    </style>

    <div class="contenu-principal">
        <div class="carte-accueil animate__animated animate__fadeIn">
            <h2>📅 HORAIRE DE COURS</h2>
            <p id="classe-display">Chargement de votre emploi du temps...</p>
            
            <div id="horaire-container" class="carte-donnees">
                </div>

   <script type="module">
    import { auth, db } from "./auth.js";
    // Importe les instances Firebase d'authentification et de base de données depuis auth.js
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    // Importe l'écouteur pour détecter le changement d'état de connexion de l'utilisateur
    import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    // Importe les fonctions de requêtes et de manipulation de documents Firestore

    onAuthStateChanged(auth, async (user) => {
        // Déclenche l'écoute de l'état de l'authentification de l'utilisateur courant
        if (!user) {
            // Si aucun utilisateur n'est connecté à l'application
            window.location.href = "login.html";
            // Redirige immédiatement l'utilisateur vers la page de connexion
            return;
            // Interrompt l'exécution de la fonction d'écoute
        }

        const container = document.getElementById('horaire-container');
        // Récupère l'élément HTML destiné à afficher le planning hebdomadaire
        const displayLabel = document.getElementById('classe-display');
        // Récupère l'élément textuel affichant les détails de la classe ou de l'enseignant

        function norm(s) {
            if (!s) return "";
            return String(s).toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
        }

        try {
            // Bloc de sécurité try-catch pour intercepter les échecs liés à Firestore
            // 1. Récupérer les infos de l'utilisateur (on vérifie "users" et "utilisateurs")
            const snapUsers = await getDoc(doc(db, "users", user.uid));
            const snapUtils = await getDoc(doc(db, "utilisateurs", user.uid));
            
            const u = snapUsers.exists() ? snapUsers.data() : {};
            const v = snapUtils.exists() ? snapUtils.data() : {};

            if (!snapUsers.exists() && !snapUtils.exists()) {
                displayLabel.innerText = "Erreur de profil";
                container.innerHTML = "<p style='text-align:center; padding:20px;'>Profil introuvable dans la base de données.</p>";
                return;
            }

            const userData = { ...v, ...u }; // u a la priorité sur v
            const roleRaw = String(userData.role || "").toLowerCase().trim();
            const isProf = roleRaw === "enseignant" || roleRaw === "professeur" || roleRaw.includes("prof") || roleRaw.includes("teacher");
            const isAdmin = roleRaw === "admin" || roleRaw.includes("direction") || roleRaw.includes("administrateur");

            const userNom = userData.nom || "";
            const userNomNorm = norm(userNom);

            let userClasses = [];
            if (Array.isArray(userData.classe)) {
                userClasses = userData.classe.map(c => String(c).trim());
            } else if (userData.classe) {
                userClasses = [String(userData.classe).trim()];
            }
            const userClassesNorm = userClasses.map(c => norm(c));
            const mainClasse = userClasses[0] || "Toutes";

            // 2. Titre selon le rôle
            if (isAdmin) {
                displayLabel.innerText = "Emploi du temps Général (Direction / Administration)";
            } else if (isProf) {
                displayLabel.innerText = "Planning Enseignant : " + (userNom || "Enseignant");
            } else {
                displayLabel.innerText = "Emploi du temps - Classe : " + mainClasse;
            }

            // 3. Charger tous les créneaux d'horaires depuis Firestore
            const querySnapshot = await getDocs(collection(db, "horaires"));
            const allHoraires = [];
            querySnapshot.forEach((docSnap) => {
                allHoraires.push({ id: docSnap.id, ...docSnap.data() });
            });

            // 4. Filtrer selon le rôle
            let filteredHoraires = [];
            if (isAdmin) {
                filteredHoraires = allHoraires;
            } else if (isProf) {
                filteredHoraires = allHoraires.filter(h => {
                    const profNorm = norm(h.professeur);
                    const classeNorm = norm(h.classe);
                    const matchProf = profNorm.includes(userNomNorm) || (userNomNorm.length > 0 && userNomNorm.includes(profNorm));
                    const matchClasse = userClassesNorm.includes(classeNorm);
                    return matchProf || matchClasse;
                });
            } else {
                // Élève
                filteredHoraires = allHoraires.filter(h => {
                    const classeNorm = norm(h.classe);
                    return userClassesNorm.includes(classeNorm);
                });
            }

            container.innerHTML = "";

            if (filteredHoraires.length === 0) {
                container.innerHTML = "<p style='text-align:center; padding:20px; color:#666;'>Aucun cours programmé pour le moment.</p>";
                return;
            }

            // Optionnel : filtre par classe pour l'admin
            if (isAdmin) {
                const classesSet = new Set(allHoraires.map(h => h.classe).filter(Boolean));
                let filterHTML = `
                    <div style="margin-bottom: 20px; text-align: center;">
                        <label for="select-filter-classe" style="font-weight: bold; margin-right: 10px; color: #0c5568;">Filtrer par classe :</label>
                        <select id="select-filter-classe" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #0c7489; outline: none;">
                            <option value="TOUTES">Toutes les classes</option>
                            ${Array.from(classesSet).map(cl => `<option value="${cl}">${cl}</option>`).join('')}
                        </select>
                    </div>
                    <div id="horaire-cards-wrapper"></div>
                `;
                container.innerHTML = filterHTML;

                const renderCards = (selectedClasse) => {
                    const wrapper = document.getElementById('horaire-cards-wrapper');
                    wrapper.innerHTML = "";

                    const listToRender = (selectedClasse === "TOUTES") 
                        ? filteredHoraires 
                        : filteredHoraires.filter(h => norm(h.classe) === norm(selectedClasse));

                    if (listToRender.length === 0) {
                        wrapper.innerHTML = "<p style='text-align:center; padding:20px; color:#666;'>Aucun cours pour cette classe.</p>";
                        return;
                    }

                    renderPlanning(listToRender, wrapper, isAdmin, isProf);
                };

                renderCards("TOUTES");
                document.getElementById('select-filter-classe').addEventListener('change', (e) => {
                    renderCards(e.target.value);
                });
            } else {
                renderPlanning(filteredHoraires, container, isAdmin, isProf);
            }

        } catch (error) {
            // En cas d'erreur de chargement Firestore ou réseau
            console.error("Erreur Firestore :", error);
            // Affiche l'erreur complète dans la console de débogage
            container.innerHTML = "<p style='text-align:center; color:red; padding:20px;'>Erreur de chargement des données d'horaire.</p>";
        }
    });

    function renderPlanning(items, targetContainer, isAdmin, isProf) {
        const joursOrder = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];
        const planning = {};

        items.forEach(cours => {
            const j = cours.jour || "Autre";
            if (!planning[j]) planning[j] = [];
            planning[j].push(cours);
        });

        const presentDays = [...joursOrder.filter(j => planning[j]), ...Object.keys(planning).filter(j => !joursOrder.includes(j))];

        presentDays.forEach(jour => {
            planning[jour].sort((a, b) => (a.heure || "").localeCompare(b.heure || ""));

            let jourHTML = `<h3 style="color: #0c5568; margin-top: 25px; border-bottom: 2px solid #0c7489; padding-bottom: 5px;">${jour}</h3>`;
            
            planning[jour].forEach(cours => {
                let detailInfo = "";
                if (isAdmin) {
                    detailInfo = `🏫 Classe : <strong>${cours.classe || 'N/A'}</strong> &nbsp;|&nbsp; 👨‍🏫 Enseignant : <strong>${cours.professeur || 'N/A'}</strong>`;
                } else if (isProf) {
                    detailInfo = `🏫 Classe : <strong>${cours.classe || 'N/A'}</strong>`;
                } else {
                    detailInfo = `👨‍🏫 Enseignant : <strong>${cours.professeur || 'N/A'}</strong>`;
                }

                jourHTML += `
                    <div class="animate__animated animate__fadeInLeft" style="margin-bottom: 12px; padding: 15px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #0c5568;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <strong style="font-size: 1.1em; color: #333;">${cours.matiere || 'Matière'}</strong>
                            <span style="color: #0c5568; font-weight: bold; background: #e0f2f1; padding: 4px 10px; border-radius: 6px;">${cours.heure || ''}</span>
                        </div>
                        <div style="margin-top: 8px; color: #666; font-size: 0.9em;">
                            ${detailInfo}
                        </div>
                    </div>
                `;
            });
            targetContainer.innerHTML += jourHTML;
        });
    }
    // --- SÉCURITÉ : ANTI-INSPECTION ---
    // Bloquer le clic droit
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    // Empêche l'ouverture du menu contextuel (clic droit) sur toute la page

    // Bloquer les raccourcis clavier (F12, Ctrl+U, Ctrl+Shift+I, etc.)
    document.addEventListener('keydown', (e) => {
        // Écoute chaque touche pressée sur le clavier pour intercepter les raccourcis de développeur
        if (
            e.key === 'F12' || 
            // Vérifie si la touche F12 (ouvre les DevTools) est pressée
            (e.ctrlKey && e.shiftKey && e.key === 'I') || 
            // Vérifie la combinaison Ctrl+Shift+I (ouvre les DevTools)
            (e.ctrlKey && e.shiftKey && e.key === 'J') || 
            // Vérifie la combinaison Ctrl+Shift+J (ouvre la console)
            (e.ctrlKey && e.key === 'u') ||
            // Vérifie Ctrl+U (affiche le code source)
            (e.ctrlKey && e.key === 's')
            // Vérifie Ctrl+S (sauvegarde de la page)
        ) {
            e.preventDefault();
            // Annule l'action par défaut du raccourci clavier détecté
            alert("L'inspection du code est désactivée pour des raisons de sécurité.");
            // Affiche un message expliquant pourquoi l'action est bloquée
            return false;
            // Retourne false pour s'assurer que l'événement est complètement stoppé
        }
    });

</script>
