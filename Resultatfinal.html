<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilan Annuel - E-SCHOOL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #071e2b 0%, #0c7489 100%) no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Conteneur principal adapté aux écrans */
        .contenu-principal {
            padding: 80px 15px 40px; /* Espace pour le header */
            width: 100%;
            box-sizing: border-box;
        }

        /* Style Papier Bulletin */
        .bulletin-papier {
            background: white;
            padding: 20px;
            width: 100%;
            max-width: 900px; /* Largeur max sur PC */
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: #333;
            overflow-x: auto; /* Scroll horizontal sur petit mobile si tableau trop large */
            margin: 0 auto;
        }

        .en-tete-bulletin {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #0c5568;
            padding-bottom: 15px;
            margin-bottom: 20px;
            gap: 15px;
        }

        .infos-ecole h3 { margin: 0; color: #0c5568; font-size: 1.4em; }
        .infos-ecole p { margin: 5px 0; font-weight: bold; }

        .details-eleve {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        /* Tableau Responsive */
        .tableau-bulletin {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px; /* Force une largeur minimale pour éviter le chevauchement des chiffres */
        }

        .tableau-bulletin th, .tableau-bulletin td {
            border: 1px solid #ccc;
            padding: 10px 5px;
            text-align: center;
            font-size: 0.9em;
        }

        .tableau-bulletin th { background: #f2f2f2; font-weight: bold; }
        .nom-matiere {
            position: sticky;
            left: 0;
            background: #f9f9f9; /* Obligatoire pour cacher ce qui passe dessous */
            z-index: 1;
            border-right: 2px solid #0c5568 !important;
            text-align: left !important;
            font-weight: bold;
            min-width: 120px;
            padding-left: 10px !important;
        }

        /* On s'assure que le header aussi reste fixé si besoin */
        .tableau-bulletin thead th:first-child {
            position: sticky;
            left: 0;
            z-index: 2;
            background: #f2f2f2;
        }
        .bold { font-weight: bold; background: #fff0f0; }

        /* Footer et Pourcentage */
        .pied-bulletin {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px solid #eee;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .stats-pied {
            flex: 1;
            min-width: 200px;
            text-align: left;
        }

        .mention {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 25px;
            background: #0d3b4f;
            color: white;
            font-weight: bold;
            border-radius: 50px;
            font-size: 1.1em;
        }

        div[style*="overflow-x: auto"] {
            -webkit-overflow-scrolling: touch; /* Rend le défilement fluide sur iPhone */
            border-radius: 8px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .en-tete-bulletin { flex-direction: column; text-align: center; }
            .bulletin-papier { padding: 15px; }
            .logo-en-tete { height: 50px; }
            .infos-ecole h3 { font-size: 1.1em; }
            .pied-bulletin { flex-direction: column; text-align: center; }
            .stats-pied { text-align: center; }
        }

        @media screen and (max-width: 600px) {
            .tableau-bulletin th, .tableau-bulletin td {
                padding: 4px 2px; /* Espacement réduit */
                font-size: 0.75em; /* Texte plus petit */
            }

            .nom-matiere {
                min-width: 80px; /* Empêche le nom de la matière d'être trop écrasé */
            }
        }
    </style>
</head>
<body>

    <div class="en-tete">
    <div class="en-tete-gauche">
        <div class="btn-menu" onclick="toggleMenu()">☰</div>
        <div style="font-weight: bold; font-size: 1.2em;">E-SCHOOL</div>
    </div>

    <img src="images/image.png" alt="E-SCHOOL logo" class="logo-en-tete">
</div>

    <div id="sidebar" class="barre-laterale">
    <h2>Menu</h2>
    <a href="accueil.html">Accueil</a>
    
    <a href="comunique.html">Communiqués</a>
    <a href="horaire.html">Horaire</a>
    <a href="profil.html" id="menu-profil" style="display:none;">Mon Profil</a>

    <a href="MesCotes.html" id="menu-eleve-notes" style="display:none;">Mes Cotes</a>

    <a href="CoterE.html" id="menu-eleve-coter" style="display:none;">Coter les Enseigant</a>
    
    <a href="Saisir-note.html" id="menu-prof-saisie-notes" style="display:none;">Saisir les notes</a>
    
    <a href="javascript:void(0)" onclick="ouvrirGestionEcole()" id="menu-Enseignant" style="display:none;">Supervision Direction</a>

    <a href="Redac-com.html" id="menu-prof-communiquer" style="display:none;">Rédaction du communiquer</a>

    <a href="Appel.html" id="menu-prof-appel" style="display:none;">Faire l'Appel</a>

    <button onclick="logout()" class="btn-deconnexion">Se déconnecter</button>
</div>
    <div id="overlay" class="voile" onclick="toggleMenu()"></div>


    <div class="contenu-principal">
        <div id="liste-notes">
            <p style="color: white; text-align: center;">Chargement de votre bilan annuel...</p>
        </div>
    </div>

<script type="module">
    import { auth, db } from "./auth.js";
    // Importe les instances d'authentification et de base de données Firebase depuis auth.js
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    // Importe l'écouteur d'état de connexion de Firebase Auth
    import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    // Importe les fonctions de requêtes et de manipulation de documents Firestore

    function normNom(s) {
        // Déclare la fonction qui normalise un nom pour des comparaisons insensibles à la casse et aux accents
        return String(s || "").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, " ");
        // Convertit en chaîne, supprime les espaces excessifs, met en minuscules et retire les accents
    }

    function normClasse(s) {
        // Déclare la fonction de normalisation du nom de la classe
        if (!s) return "";
        let str = String(s).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        str = str.replace(/^(\d+)(er|ere|erè|è|eme|emè|em|ème)?\s*/i, "$1 ");
        return str.replace(/[^a-z0-9]/g, "");
    }

    async function lireProfilFusionne(uid) {
        // Déclare une fonction asynchrone qui fusionne les informations de l'élève depuis deux collections possibles
        try {
            const snapUsers = await getDoc(doc(db, "users", uid));
            const snapUtils = await getDoc(doc(db, "utilisateurs", uid));
            const u = snapUsers.exists() ? snapUsers.data() : {};
            const v = snapUtils.exists() ? snapUtils.data() : {};

            let classeRaw = u.classe || v.classe || u.maClasse || v.maClasse || "";
            if (Array.isArray(classeRaw)) classeRaw = classeRaw[0] || "";

            const nomRaw = u.nom || v.nom || u.name || v.name || u.monNomBrut || "";

            return { 
                ok: snapUsers.exists() || snapUtils.exists(), 
                maClasse: String(classeRaw).trim(), 
                monNomBrut: nomRaw || "Utilisateur",
                monNomNorm: normNom(nomRaw)
            };
        } catch (e) {
            return { ok: false, maClasse: "", monNomBrut: "Utilisateur", monNomNorm: "" };
        }
    }

    const urlParams = new URLSearchParams(window.location.search);
    // Analyse les paramètres de requête présents dans l'URL de la page
    const targetUid = urlParams.get('uid');
    // Extrait l'identifiant (UID) de l'élève ciblé depuis l'URL
    const targetClasse = urlParams.get('classe');
    // Extrait le nom de la classe de l'élève ciblé depuis l'URL

    onAuthStateChanged(auth, async (user) => {
        // Écoute les changements d'état de connexion de l'utilisateur courant
        if (!user) { window.location.href = "login.html"; return; }
        // Si aucun utilisateur n'est connecté, redirige vers la page de connexion et s'arrête
        const container = document.getElementById('liste-notes');
        // Récupère l'élément HTML où le bilan annuel sera affiché

        try {
            // Bloc try pour attraper les erreurs Firestore ou réseau
            // Vérification du rôle admin pour accéder à cette page
            const snapAdmin = await getDoc(doc(db, "users", user.uid));
            // Récupère le profil de l'utilisateur connecté dans Firestore
            const roleData = snapAdmin.exists() ? snapAdmin.data().role : "";
            // Extrait la valeur du rôle de l'utilisateur
            const role = String(roleData).toLowerCase();
            // Convertit le rôle en minuscules pour comparaison
            const isAdmin = role === "admin" || role.includes("direction");
            // Vérifie si l'utilisateur connecté a les droits d'administration ou de direction

            if (!isAdmin) {
                // Si l'utilisateur connecté n'est pas autorisé
                container.innerHTML = "<p style='color: white; text-align: center;'>Accès restreint à la direction.</p>";
                // Affiche un message de restriction d'accès
                return;
                // Arrête l'exécution de l'affichage
            }

            if (!targetUid && !targetClasse) {
                // Si les paramètres d'URL sont manquants
                container.innerHTML = "<p style='color: white; text-align: center;'>Veuillez sélectionner un élève via le panel de gestion.</p>";
                // Affiche un message d'instruction pour l'administrateur
                return;
                // Arrête l'exécution de l'affichage
            }

            const profil = await lireProfilFusionne(targetUid);
            // Récupère le profil consolidé de l'élève ciblé
            const monNomCible = profil.monNomNorm;
            // Normalise le nom de l'élève pour fiabiliser la recherche de ses notes
            const maClasse = profil.maClasse || targetClasse || "";
            // Assigne la classe ciblée à une variable locale
            const maClasseNorm = normClasse(maClasse);

            // 1. Récupérer TOUTES les notes depuis Firestore (sans filtre restrictif pour éviter d'omettre des notes)
            const snapNotes = await getDocs(collection(db, "notes"));
            
            const toutesNotes = [];
            // Initialise un tableau vide pour stocker les notes spécifiques de l'élève
            const totauxTousEleves = {}; // Pour calculer le classement de la classe

            snapNotes.forEach(snap => {
                // Parcourt chaque document de note retourné
                const data = snap.data();
                if (!data) return;

                const nomEnBase = normNom(data.nomEleveNorm || data.nomEleve || data.nom);
                const classeEnBaseNorm = normClasse(data.classe);

                // Correspondance de la classe pour le calcul du rang
                if (nomEnBase && (classeEnBaseNorm === maClasseNorm || maClasseNorm === "")) {
                    totauxTousEleves[nomEnBase] = (totauxTousEleves[nomEnBase] || 0) + (parseFloat(data.note) || 0);
                }

                // Vérifie si la note appartient à l'élève ciblé (par UID ou par nom normalisé)
                const isStudentMatch = (targetUid && (data.eleveUid === targetUid || data.uid === targetUid || data.eleveId === targetUid)) ||
                                       (monNomCible !== "" && nomEnBase === monNomCible);

                if (isStudentMatch) {
                    toutesNotes.push(data);
                }
            });

            // Calcul du rang/place au sein de la classe
            const listeClassement = Object.entries(totauxTousEleves).sort((a, b) => b[1] - a[1]).map(e => e[0]);
            const maPlace = monNomCible ? (listeClassement.indexOf(monNomCible) + 1) : 0;
            const totalEleves = listeClassement.length;

            // 2. Préparer le regroupement des notes par matière
            const bulletinComplet = {};

            function fixerPeriode(p) {
                if (!p) return "";
                const s = String(p).trim();
                const norm = normNom(s);
                if (norm.includes("1") && norm.includes("per")) return "1ère Période";
                if (norm.includes("2") && norm.includes("per")) return "2ème Période";
                if (norm.includes("1") && (norm.includes("ex") || norm.includes("sem"))) return "Examen 1er Semestre";
                if (norm.includes("3") && norm.includes("per")) return "3ème Période";
                if (norm.includes("4") && norm.includes("per")) return "4ème Période";
                if (norm.includes("2") && (norm.includes("ex") || norm.includes("sem"))) return "Examen 2ème Semestre";
                return s;
            }

            toutesNotes.forEach(n => {
                const matNom = String(n.matiere || "Sans nom").trim().toUpperCase();
                const perClean = fixerPeriode(n.periode);

                if (!bulletinComplet[matNom]) {
                    bulletinComplet[matNom] = {
                        "1ère Période": "-", "2ème Période": "-", "Examen 1er Semestre": "-",
                        "3ème Période": "-", "4ème Période": "-", "Examen 2ème Semestre": "-",
                        max: parseFloat(n.max || 20) 
                    };
                }
                if (perClean) {
                    bulletinComplet[matNom][perClean] = parseFloat(n.note);
                }
                if (n.max) {
                    bulletinComplet[matNom].max = Math.max(bulletinComplet[matNom].max, parseFloat(n.max));
                }
            });

            // 3. Générer les lignes (Rows)
            let grandTotalObtenu = 0;
            let grandTotalMaxPossible = 0;
            let rowsHtml = "";

            if (Object.keys(bulletinComplet).length === 0) {
                rowsHtml = `<tr><td colspan="9" style="text-align:center; padding:30px; color:gray;">Aucune note n'a encore été saisie pour cet élève.</td></tr>`;
            } else {
                for (const [matiere, scores] of Object.entries(bulletinComplet)) {
                    const p1 = scores["1ère Période"] === "-" ? 0 : scores["1ère Période"];
                    const p2 = scores["2ème Période"] === "-" ? 0 : scores["2ème Période"];
                    const e1 = scores["Examen 1er Semestre"] === "-" ? 0 : scores["Examen 1er Semestre"];
                    const hasS1 = scores["1ère Période"] !== "-" || scores["2ème Période"] !== "-" || scores["Examen 1er Semestre"] !== "-";
                    const totalS1 = hasS1 ? (p1 + p2 + e1) : "-";

                    const p3 = scores["3ème Période"] === "-" ? 0 : scores["3ème Période"];
                    const p4 = scores["4ème Période"] === "-" ? 0 : scores["4ème Période"];
                    const e2 = scores["Examen 2ème Semestre"] === "-" ? 0 : scores["Examen 2ème Semestre"];
                    const hasS2 = scores["3ème Période"] !== "-" || scores["4ème Période"] !== "-" || scores["Examen 2ème Semestre"] !== "-";
                    const totalS2 = hasS2 ? (p3 + p4 + e2) : "-";
                    
                    // Calcul cumulatif du total obtenu et max
                    ["1ère Période", "2ème Période", "Examen 1er Semestre", "3ème Période", "4ème Période", "Examen 2ème Semestre"].forEach(per => {
                        if (scores[per] !== "-") {
                            grandTotalObtenu += scores[per];
                            grandTotalMaxPossible += scores.max;
                        }
                    });

                    rowsHtml += `
                        <tr>
                            <td class="nom-matiere">${matiere}</td>
                            <td>${scores["1ère Période"]}</td><td>${scores["2ème Période"]}</td><td>${scores["Examen 1er Semestre"]}</td>
                            <td class="bold">${totalS1}</td>
                            <td>${scores["3ème Période"]}</td><td>${scores["4ème Période"]}</td><td>${scores["Examen 2ème Semestre"]}</td>
                            <td class="bold">${totalS2}</td>
                        </tr>`;
                }
            }

            const pourcentageActuel = grandTotalMaxPossible > 0 ? ((grandTotalObtenu / grandTotalMaxPossible) * 100).toFixed(1) : 0;
            // Calcule le pourcentage général de réussite de l'élève

            // 4. Affichage final du tableau (TOUJOURS EXÉCUTÉ)
            container.innerHTML = `
                <div class="bulletin-papier animate__animated animate__fadeIn">
                    <div class="en-tete-bulletin">
                        <img src="images/logo_small.png" style="height:60px;">
                        <div class="infos-ecole">
                            <h3>E-SCHOOL</h3>
                            <p>Année Scolaire 2025-2026</p>
                            <h4>BILAN ANNUEL ÉVOLUTIF</h4>
                        </div>
                    </div>

                    <div class="details-eleve">
                        <div><strong>ÉLÈVE :</strong> ${profil.monNomBrut.toUpperCase()}</div>
                        <div><strong>CLASSE :</strong> ${maClasse}</div>
                    </div>

                    <div style="overflow-x: auto;">
                        <table class="tableau-bulletin">
                            <thead>
                                <tr>
                                    <th rowspan="2">MATIÈRES</th>
                                    <th colspan="4">1er SEMESTRE</th>
                                    <th colspan="4">2ème SEMESTRE</th>
                                </tr>
                                <tr>
                                    <th>P1</th><th>P2</th><th>Ex1</th><th>Total</th>
                                    <th>P3</th><th>P4</th><th>Ex2</th><th>Total</th>
                                </tr>
                            </thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                    </div>

                    <div class="pied-bulletin">
                        <div class="stats-pied">
                            <p style="margin: 5px 0; font-size: 1.1em; color: #1e3a8a;"><strong>PLACE : ${maPlace > 0 ? maPlace + (maPlace === 1 ? 'ère' : 'ème') : '-'} sur ${totalEleves}</strong></p>
                            <p style="margin: 5px 0;">Points cumulés : <strong>${grandTotalObtenu} / ${grandTotalMaxPossible}</strong></p>
                            <!-- En bas se trouve l'endroit où j'ai coder le pourcentage -->
                            <p style="margin: 5px 0; font-size: 1.3em; color: #0c5568;">Pourcentage Actuel : <strong>${pourcentageActuel}%</strong></p>
                        </div>
                        <div style="font-style: italic; color: #666; font-size: 0.8em;">Document généré pour supervision direction</div>
                    </div>
                </div>`;
            // Injecte le template HTML complet et stylisé du bulletin de notes dans la page

        } catch (error) {
            // En cas d'erreur de réseau ou Firestore
            console.error("Erreur:", error);
            // Affiche les détails de l'erreur dans la console pour débugger
            container.innerHTML = "<p style='color:white; text-align:center;'>Erreur de chargement des données.</p>";
            // Affiche un message d'erreur blanc au centre de l'écran
        }
    });
    // --- SÉCURITÉ : ANTI-INSPECTION ---
    // Bloquer le clic droit
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    // Empêche l'ouverture du menu contextuel (clic droit) sur toute la page

    // Bloquer les raccourcis clavier (F12, Ctrl+U, Ctrl+Shift+I, etc.)
    document.addEventListener('keydown', (e) => {
        // Écoute chaque touche pressée sur le clavier pour intercepter les raccourcis de développeur
        if (
            e.key === 'F12' || 
            // Vérifie si la touche F12 (ouvre les DevTools) est pressée
            (e.ctrlKey && e.shiftKey && e.key === 'I') || 
            // Vérifie la combinaison Ctrl+Shift+I (ouvre les DevTools)
            (e.ctrlKey && e.shiftKey && e.key === 'J') || 
            // Vérifie la combinaison Ctrl+Shift+J (ouvre la console)
            (e.ctrlKey && e.key === 'u') ||
            // Vérifie Ctrl+U (affiche le code source)
            (e.ctrlKey && e.key === 's')
            // Vérifie Ctrl+S (sauvegarde de la page)
        ) {
            e.preventDefault();
            // Annule l'action par défaut du raccourci clavier détecté
            alert("L'inspection du code est désactivée pour des raisons de sécurité.");
            // Affiche un message expliquant pourquoi l'action est bloquée
            return false;
            // Retourne false pour s'assurer que l'événement est complètement stoppé
        }
    });
</script>
<script>
        // FONCTION POUR OUVRIR / FERMER LE MENU
        function toggleMenu() {
            // Déclare la fonction qui bascule l'affichage du menu latéral
            document.getElementById("sidebar").classList.toggle("active");
            // Ajoute ou supprime la classe CSS "active" sur la barre latérale pour l'ouvrir/fermer
            document.getElementById("overlay").classList.toggle("active");
            // Ajoute ou supprime la classe CSS "active" sur le fond semi-transparent
        }
    </script>
    
    <script type="module" src="app.js"></script>
</body>
</html>
