<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - E-SCHOOL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body class="corps-auth">

    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #071e2b 0%, #0c7489 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .conteneur-inscription {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .groupe-champ { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select {
            width: 100%; padding: 10px;
            border: 2px solid #e2e8f0; border-radius: 8px;
            box-sizing: border-box;
        }
        .btn-connexion {
            width: 100%; padding: 12px;
            background-color: #0c5568; color: white;
            border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-connexion:hover {
            background-color: #0a3d52;
        }
    </style>
    <div class="conteneur"> 
        <div class="carte animate__animated animate__fadeInDown">
            <img src="images/logo_small.png" alt="E-SCHOOL Logo" style="width:70px; margin-bottom:12px;">
            <h2 style="color: #0d3b4f; margin-bottom: 20px;">Connexion</h2>
            
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email de l'école" required>
                <input type="password" id="login-password" placeholder="Mot de passe" required>
                <button class="btn-connexion">
                    Se connecter
                </button>
            </form>
            
            <p style="margin-top: 20px; font-size: 0.9em; color: #666;">
                Pas encore de compte ? <a href="register.html" style="color: #0c5568; text-decoration: none; font-weight: bold;">S'inscrire ici</a>
            </p>
        </div>
    </div>

    <script>
        // --- SÉCURITÉ : ANTI-INSPECTION (Genre l'inpection du code possible dans les navigateur telle que chrome) ---
        // Bloquer le clic droit
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        // Empêche l'ouverture du menu contextuel (clic droit) sur toute la page

        // Bloquer les raccourcis clavier (F12, Ctrl+U, Ctrl+Shift+I, etc.)
        document.addEventListener('keydown', (e) => {
            // Écoute chaque touche pressée sur le clavier pour intercepter les raccourcis de développeur
            if (
                e.key === 'F12' || 
                // Vérifie si la touche F12 (ouvre les DevTools) est pressée
                (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                // Vérifie la combinaison Ctrl+Shift+I (ouvre les DevTools)
                (e.ctrlKey && e.shiftKey && e.key === 'J') || 
                // Vérifie la combinaison Ctrl+Shift+J (ouvre la console)
                (e.ctrlKey && e.key === 'u') ||
                // Vérifie Ctrl+U (affiche le code source)
                (e.ctrlKey && e.key === 's')
                // Vérifie Ctrl+S (sauvegarde de la page)
            ) {
                e.preventDefault();
                // Annule l'action par défaut du raccourci clavier détecté
                alert("L'inspection du code est désactivée pour des raisons de sécurité.");
                // Affiche un message expliquant pourquoi l'action est bloquée
                return false;
                // Retourne false pour s'assurer que l'événement est complètement stoppé
            }
        });
    </script>
    <script type="module" src="auth.js"></script>
    
</body>
</html>
