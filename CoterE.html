    <meta charset="UTF-8">

<body>

    <style>
        /* Styles déplacés dans le head pour une meilleure conformité HTML */
        body {
            background: linear-gradient(135deg, #071e2b 0%, #0c7489 100%) no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: block; /* Désactive le flex qui cassait le menu */
        }
        .welcome-card {
            margin-top: 120px; /* Espace suffisant pour ne pas être sous le header */
            margin-bottom: 40px;
        }
        .header { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; /* Pousse les groupes aux extrémités */
    padding: 0 20px; 
    background: #0d3b4f; 
    color: white; 
    height: 60px; 
    position: fixed; 
    width: 100%; 
    top: 0; 
    left: 0; 
    z-index: 10000; 
    box-sizing: border-box; /* Évite que le padding dépasse de l'écran */
}

/* Groupe de gauche (Menu + Titre) */
.header-left {
    display: flex;
    align-items: center;
    gap: 10px; /* Espace entre le ☰ et le texte E-SCHOOL */
}

/* Logo à droite */
.header-logo {
    height: 56px; /* Ajuste la taille selon ton image */
    width: auto;
}
        .menu-btn { font-size: 30px; cursor: pointer; padding: 10px; }

        /* SIDEBAR (CORRIGÉE) */
        .sidebar { 
            position: fixed; top: 0; left: -280px; /* Cachée par défaut */
            width: 260px; height: 100%; background: #0a3d52; color: white; 
            transition: all 0.4s ease; z-index: 10001; 
            display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.3);
        }
        /* Classe qui fait apparaître le menu */
        .sidebar.active { left: 0; }

        .sidebar h2 { text-align: center; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar a { padding: 15px 25px; color: white; text-decoration: none; font-size: 1.1em; transition: 0.3s; }
        .sidebar a:hover { background: #0d3b4f; padding-left: 35px; }

        .logout-btn { 
            background: #ef4444; color: white; border: none; 
            padding: 15px; margin: auto 20px 20px; border-radius: 8px; 
            cursor: pointer; font-weight: bold; 
            width: calc(100% - 40px);
        }

        /* OVERLAY (Le fond noir quand le menu est ouvert) */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); visibility: hidden; opacity: 0; 
            transition: 0.3s; z-index: 9999; 
        }
        .overlay.active { visibility: visible; opacity: 1; }
    </style>
    <div class="header">

            <div class="menu-btn" onclick="toggleMenu()">☰</div>

        </div>
    
        <img src="images/image.png" alt="E-SCHOOL logo" class="header-logo">
    </div>
    
        <div id="sidebar" class="sidebar">
        <h2>Menu</h2>
       <a href="accueil.html">Accueil</a>
    
    <a href="comunique.html">Communiqués</a>
    <a href="horaire.html">Horaire</a>

    <a href="MesCotes.html" id="menu-eleve-notes" style="display:none;">Mes Cotes</a>

    <a href="CoterE.html" id="menu-eleve-coter" style="display:none;">Coter les Enseigant</a>
    
    <a href="Saisir-note.html" id="menu-prof-saisie-notes" style="display:none;">Saisir les notes</a>

        <button onclick="logout()" class="logout-btn">Se déconnecter</button>
    </div>
    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div class="main-content">
        <div class="welcome-card animate__animated animate__fadeIn">
            <h2>Évaluation des Enseignants</h2>
            <p>Sélectionnez un enseignant pour lui attribuer une note de performance.</p>
            
            <div class="data-card" style="text-align: left;">
                <form id="form-evaluation">
                    <label>Enseignant à évaluer :</label>
                    <select id="prof-select" required style="width: 100%; padding: 10px; margin-bottom: 20px;">
                        <option value="">Chargement des enseignants...</option>
                    </select>
            
                    <label>Maîtrise du sujet (1 à 5) :</label>
                    <input type="range" id="note-maitrise" min="1" max="5" value="3" style="width: 100%; margin-bottom: 20px;">
                    
                    <label>Disponibilité et écoute (1 à 5) :</label>
                    <input type="range" id="note-dispo" min="1" max="5" value="3" style="width: 100%; margin-bottom: 20px;">
            
                    <button type="submit" class="register-btn" style="background: #0d3b4f; width: 100%; border: none; padding: 12px; color: white; cursor: pointer; border-radius: 6px;">
                        Envoyer l'évaluation
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script type="module">
        import { auth, db } from "./auth.js";
        // Importe les instances Firebase (authentification et base de données) depuis auth.js
        import { collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        // Importe les fonctions Firestore pour créer des requêtes et lire/écrire des documents
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        // Importe la fonction pour écouter les changements d'état de connexion

        const profSelect = document.getElementById('prof-select');
        // Récupère l'élément <select> qui affichera la liste des enseignants à évaluer
        const formEval = document.getElementById('form-evaluation');
        // Récupère l'élément HTML du formulaire d'évaluation

        // 1. Charger dynamiquement tous les enseignants de l'école
        async function chargerEnseignants() {
            // Déclare une fonction asynchrone qui charge la liste des enseignants depuis Firestore
            try {
                // Bloc try : tente de récupérer les données sans planter l'application
                const q = query(collection(db, "users"), where("role", "==", "enseignant"));
                // Construit une requête Firestore pour filtrer uniquement les utilisateurs avec le rôle "enseignant"
                const querySnapshot = await getDocs(q);
                // Exécute la requête et attend la réponse de Firestore
                
                profSelect.innerHTML = '<option value="">-- Choisissez un enseignant --</option>';
                // Réinitialise le menu déroulant avec une option par défaut vide
                
                querySnapshot.forEach((doc) => {
                    // Parcourt chaque document (enseignant) retourné par la requête
                    const prof = doc.data();
                    // Extrait les données (nom, rôle, etc.) du document courant
                    profSelect.innerHTML += `<option value="${doc.id}">${prof.nom}</option>`;
                    // Ajoute une option dans la liste déroulante avec l'ID comme valeur et le nom comme libellé
                });
            } catch (error) {
                // Si une erreur survient (réseau, permissions Firestore, etc.)
                console.error("Erreur lors du chargement des profs:", error);
                // Affiche l'erreur dans la console pour faciliter le débogage
            }
        }

        // 2. Envoyer l'évaluation
        formEval.addEventListener('submit', async (e) => {
            // Écoute la soumission du formulaire d'évaluation (async pour utiliser await)
            e.preventDefault();
            // Empêche le rechargement de la page lors de la soumission du formulaire
            const user = auth.currentUser;
            // Récupère l'objet de l'utilisateur actuellement connecté

            if (!user) {
                // Vérifie qu'un utilisateur est bien connecté avant de continuer
                alert("Vous devez être connecté.");
                // Informe l'utilisateur qu'il doit être connecté pour évaluer
                return;
                // Arrête l'exécution si personne n'est connecté
            }

            try {
                // Bloc try : tente d'enregistrer l'évaluation dans Firestore
                await addDoc(collection(db, "evaluations_profs"), {
                    // Crée un nouveau document dans la collection "evaluations_profs"
                    profId: profSelect.value,
                    // ID Firestore de l'enseignant évalué
                    profNom: profSelect.options[profSelect.selectedIndex].text,
                    // Nom de l'enseignant sélectionné (texte visible de l'option)
                    eleveId: user.uid,
                    // UID de l'élève qui soumet l'évaluation
                    maitrise: document.getElementById('note-maitrise').value,
                    // Note de maîtrise du sujet donnée par l'élève (de 1 à 5)
                    disponibilite: document.getElementById('note-dispo').value,
                    // Note de disponibilité donnée par l'élève (de 1 à 5)
                    date: new Date()
                    // Date et heure exacte de l'évaluation
                });

                alert("Merci ! Votre évaluation a été enregistrée.");
                // Informe l'élève que son évaluation a bien été sauvegardée
                formEval.reset();
                // Réinitialise tous les champs du formulaire après soumission réussie
            } catch (error) {
                // Si une erreur Firestore survient lors de l'enregistrement
                alert("Erreur : " + error.message);
                // Affiche le message d'erreur à l'utilisateur
            }
        });

        // Lancer le chargement au démarrage
        onAuthStateChanged(auth, (user) => {
            // Écoute les changements d'état de connexion au chargement de la page
            if (user) {
                // Si un utilisateur est connecté, on charge la liste des enseignants
                chargerEnseignants();
                // Appelle la fonction pour remplir le menu déroulant des enseignants
            } else {
                // Si personne n'est connecté
                window.location.href = "login.html";
                // Redirige vers la page de connexion
            }
        });
        // --- SÉCURITÉ : ANTI-INSPECTION ---
        // Bloquer le clic droit
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        // Empêche l'ouverture du menu contextuel (clic droit) sur toute la page

        // Bloquer les raccourcis clavier (F12, Ctrl+U, Ctrl+Shift+I, etc.)
        document.addEventListener('keydown', (e) => {
            // Écoute chaque touche pressée sur le clavier pour intercepter les raccourcis de développeur
            if (
                e.key === 'F12' || 
                // Vérifie si la touche F12 (ouvre les DevTools) est pressée
                (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                // Vérifie la combinaison Ctrl+Shift+I (ouvre les DevTools)
                (e.ctrlKey && e.shiftKey && e.key === 'J') || 
                // Vérifie la combinaison Ctrl+Shift+J (ouvre la console)
                (e.ctrlKey && e.key === 'u') ||
                // Vérifie Ctrl+U (affiche le code source)
                (e.ctrlKey && e.key === 's')
                // Vérifie Ctrl+S (sauvegarde de la page)
            ) {
                e.preventDefault();
                // Annule l'action par défaut du raccourci clavier détecté
                alert("L'inspection du code est désactivée pour des raisons de sécurité.");
                // Affiche un message expliquant pourquoi l'action est bloquée
                return false;
                // Retourne false pour s'assurer que l'événement est complètement stoppé
            }
        });
    </script>

</body>
</html>
