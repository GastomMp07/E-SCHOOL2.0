    <div class="contenu-principal">
        <div class="carte-accueil">
            <h2>📊 Mes Bulletins & Résultats</h2>

            <div id="content-area">
                <div class="conteneur-onglets" id="tabs-section" style="display: none;">
                    <button class="btn-onglet active" onclick="changerPeriode('1ère Période', this)">1ère Période</button>
                    <button class="btn-onglet" onclick="changerPeriode('2ème Période', this)">2ème Période</button>
                    <button class="btn-onglet" onclick="changerPeriode('Examen 1er Semestre', this)">Examen 1er Sem</button>
                    
                    <button class="btn-onglet btn-synthese" onclick="changerPeriode('SYNTHESE_S1', this)">📊 Total S1</button>
                    
                    <button class="btn-onglet" onclick="changerPeriode('3ème Période', this)">3ème Période</button>
                    <button class="btn-onglet" onclick="changerPeriode('4ème Période', this)">4ème Période</button>
                    <button class="btn-onglet" onclick="changerPeriode('Examen 2ème Semestre', this)">Examen 2ème Sem</button>
                    
                    <button class="btn-onglet btn-synthese" onclick="changerPeriode('SYNTHESE_S2', this)">📊 Total S2</button>

    <script type="module">
    import { auth, db } from "./auth.js";
    // Importe les instances Firebase (authentification et base de données) depuis auth.js
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    // Importe la fonction pour écouter les changements d'état de connexion
    import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    // Importe les fonctions Firestore pour lire des documents et exécuter des requêtes filtrées

    let toutesMesNotes = [];
    // Déclare un tableau global qui contiendra toutes les notes de l'élève connecté
    let periodeSelectionnee = "1ère Période";
    // Initialise la période sélectionnée par défaut à la première période

    function normNom(s) {
        // Déclare une fonction qui normalise un nom pour des comparaisons insensibles à la casse et aux accents
        return String(s || "").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, " ");
        // Convertit en chaîne, supprime les espaces excessifs, met en minuscules et retire les accents
    }

    function premiereValeurUtile(...candidats) {
        // Déclare une fonction qui retourne la première valeur non nulle et non vide parmi les arguments
        for (const x of candidats) {
            // Parcourt chaque valeur candidate dans l'ordre
            if (x == null) continue;
            // Ignore les valeurs nulles ou undefined
            const s = String(x).trim();
            // Convertit la valeur en chaîne et retire les espaces
            if (s !== "") return s;
            // Si la chaîne n'est pas vide, la retourne immédiatement
        }
        return "";
        // Si toutes les valeurs sont vides ou nulles, retourne une chaîne vide
    }

    window.changerPeriode = (periode, btn) => {
        // Expose la fonction de changement de période sur window pour qu'elle soit accessible depuis le HTML
        periodeSelectionnee = periode;
        // Met à jour la variable globale avec la nouvelle période choisie
        document.querySelectorAll('.btn-onglet').forEach(b => b.classList.remove('active'));
        // Retire la classe CSS 'active' de tous les onglets
        btn.classList.add('active');
        // Ajoute la classe CSS 'active' à l'onglet cliqué pour le mettre en surbrillance
        afficherNotesFiltrees();
        // Appelle la fonction qui affiche les notes correspondant à la nouvelle période
    };

    async function obtenirNbCoursAttendus(maClasse) {
        // Déclare une fonction asynchrone qui compte le nombre de matières uniques dans l'horaire de la classe
        try {
            // Bloc try : tente de récupérer les données Firestore
            const q = query(collection(db, "horaires"), where("classe", "==", maClasse));
            // Construit une requête pour filtrer les horaires de la classe spécifiée
            const snap = await getDocs(q);
            // Exécute la requête et attend la réponse
            const matieresUniques = new Set();
            // Crée un ensemble (Set) pour stocker les matières sans doublons
            snap.forEach(doc => {
                // Parcourt chaque créneau d'horaire récupéré
                const cours = doc.data().matiere;
                // Extrait le nom de la matière du document
                if (cours) matieresUniques.add(cours.trim());
                // Si la matière existe, l'ajoute à l'ensemble (les doublons sont ignorés automatiquement)
            });
            return matieresUniques.size;
            // Retourne le nombre de matières uniques trouvées
        } catch (e) { return 0; }
        // En cas d'erreur, retourne 0 (aucune matière attendue)
    }

    async function afficherNotesFiltrees() {
        // Déclare une fonction asynchrone qui affiche les notes selon la période sélectionnée
        const container = document.getElementById('liste-notes');
        // Récupère l'élément HTML où les notes seront affichées
        const user = auth.currentUser;
        // Récupère l'utilisateur actuellement connecté
        if (!user) return;
        // Si personne n'est connecté, arrête l'exécution

        const profil = await lireProfilFusionne(user.uid);
        // Récupère le profil fusionné de l'élève (données des deux collections)
        
        // --- LOGIQUE DE FILTRAGE PAR PÉRIODE OU SEMESTRE ---
        let notesAffichees = [];
        // Initialise le tableau des notes à afficher (vide au départ)
        let titreBulletin = periodeSelectionnee;
        // Initialise le titre du bulletin avec le nom de la période sélectionnée
        let labelMax = "MAX";
        // Initialise le label de la colonne maximum

        if (periodeSelectionnee === "SYNTHESE_S1") {
            // Si la période sélectionnée est la synthèse du premier semestre
            const periodesS1 = ["1ère Période", "2ème Période", "Examen 1er Semestre"];
            // Définit les trois périodes qui composent le premier semestre
            notesAffichees = toutesMesNotes.filter(n => periodesS1.includes(n.periode));
            // Filtre les notes pour ne garder que celles du premier semestre
            titreBulletin = "SYNTHÈSE DU PREMIER SEMESTRE";
            // Définit le titre du bulletin pour la synthèse S1
            labelMax = "MAX S1";
            // Change le label de la colonne max pour le semestre 1
        } else if (periodeSelectionnee === "SYNTHESE_S2") {
            // Si la période sélectionnée est la synthèse du deuxième semestre
            const periodesS2 = ["3ème Période", "4ème Période", "Examen 2ème Semestre"];
            // Définit les trois périodes qui composent le deuxième semestre
            notesAffichees = toutesMesNotes.filter(n => periodesS2.includes(n.periode));
            // Filtre les notes pour ne garder que celles du deuxième semestre
            titreBulletin = "SYNTHÈSE DU SECOND SEMESTRE";
            // Définit le titre du bulletin pour la synthèse S2
            labelMax = "MAX S2";
            // Change le label de la colonne max pour le semestre 2
        } else {
            // Pour une période simple (non synthèse)
            notesAffichees = toutesMesNotes.filter(n => n.periode === periodeSelectionnee);
            // Filtre les notes pour ne garder que celles de la période exacte sélectionnée
            titreBulletin = "BULLETIN : " + periodeSelectionnee.toUpperCase();
            // Construit le titre du bulletin avec le nom de la période en majuscules
        }

        if (notesAffichees.length === 0) {
            // Si aucune note n'a été trouvée pour cette période
            container.innerHTML = "<p style='text-align:center; padding:20px;'>Aucune note trouvée pour cette sélection.</p>";
            // Affiche un message indiquant qu'il n'y a pas de notes
            return;
            // Arrête l'exécution pour ne pas générer un bulletin vide
        }

        // --- CALCUL DU RANG (PLACE) ---
        // Pour les synthèses, on calcule sur le total des périodes concernées
        const totauxEleves = {};
        const notesClasseToUse = window.toutesNotesClasse || [];
        
        notesClasseToUse.forEach(d => {
            const nom = normNom(d.nomEleveNorm || d.nomEleve);
            
            let match = false;
            if (periodeSelectionnee === "SYNTHESE_S1") match = ["1ère Période", "2ème Période", "Examen 1er Semestre"].includes(d.periode);
            else if (periodeSelectionnee === "SYNTHESE_S2") match = ["3ème Période", "4ème Période", "Examen 2ème Semestre"].includes(d.periode);
            else match = (d.periode === periodeSelectionnee);

            if (match) {
                totauxEleves[nom] = (totauxEleves[nom] || 0) + (parseFloat(d.note) || 0);
            }
        });

        const classements = Object.entries(totauxEleves).sort((a, b) => b[1] - a[1]).map(entry => entry[0]);
        // Trie les élèves du meilleur au moins bon total et extrait leurs noms normalisés
        const maPlace = classements.indexOf(profil.monNomNorm) + 1;
        // Trouve la position de l'élève connecté dans le classement (1-indexé)

        // --- REGROUPEMENT PAR MATIÈRE (Utile pour les synthèses) ---
        const matieresRegroupees = {};
        // Initialise un objet pour regrouper les totaux de notes par matière
        notesAffichees.forEach(n => {
            // Parcourt toutes les notes à afficher pour les regrouper par matière
            if (!matieresRegroupees[n.matiere]) {
                // Si la matière n'a pas encore de groupe, en crée un avec des totaux à zéro
                matieresRegroupees[n.matiere] = { obtenu: 0, max: 0 };
                // Initialise l'objet de regroupement avec les totaux à zéro
            }
            matieresRegroupees[n.matiere].obtenu += parseFloat(n.note) || 0;
            // Additionne la note obtenue au total de la matière
            matieresRegroupees[n.matiere].max += parseFloat(n.max || 20);
            // Additionne le maximum possible au total max de la matière (20 par défaut si absent)
        });

        // --- GÉNÉRATION HTML ---
        let totalObtenu = 0;
        // Initialise le total général de tous les points obtenus
        let totalMaxGeneral = 0;
        // Initialise le total général de tous les points possibles

        let html = `
            <div class="bulletin-final animate__animated animate__fadeIn" style="background:white; padding:20px; border-radius:10px; border:2px solid #0c5568; color:#333;">
                
                <div style="text-align:center; border-bottom:2px solid #eee; padding-bottom:15px; margin-bottom:20px;">
                    <img src="images/logo.png" alt="Logo" style="height:60px; margin-bottom:10px;">
                    <h2 style="margin:0; color:#000;">E-SCHOOL</h2>
                    <p style="margin:5px 0; font-weight:bold;">Année Scolaire 2025-2026</p>
                    <h3 style="margin:10px 0; color:#0c5568; text-decoration:underline;">${titreBulletin}</h3>
                </div>

                <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-weight:bold; font-size:0.9em;">
                    <span>NOM : ${profil.monNomNorm.toUpperCase()}</span>
                    <span>CLASSE : ${profil.maClasse}</span>
                </div>

                <table style="width:100%; border-collapse:collapse; font-size:0.9em;">
                    <thead>
                        <tr style="background:#f4f4f4;">
                            <th style="padding:10px; border:1px solid #ddd; text-align:left;">BRANCHE</th>
                            <th style="padding:10px; border:1px solid #ddd; text-align:center;">OBTENU</th>
                            <th style="padding:10px; border:1px solid #ddd; text-align:center;">${labelMax}</th>
                        </tr>
                    </thead>
                    <tbody>`;
        // Construit la structure HTML de l'en-tête du bulletin avec les informations de l'élève et le tableau de notes

        for (const [nomMatiere, data] of Object.entries(matieresRegroupees)) {
            // Parcourt chaque matière regroupée pour générer une ligne dans le tableau
            totalObtenu += data.obtenu;
            // Ajoute le total de la matière au grand total général obtenu
            totalMaxGeneral += data.max;
            // Ajoute le maximum de la matière au grand total maximum général

            html += `
                <tr>
                    <td style="padding:8px; border:1px solid #ddd; font-weight:bold;">${nomMatiere.toUpperCase()}</td>
                    <td style="padding:8px; border:1px solid #ddd; text-align:center; font-weight:bold; ${data.obtenu < (data.max/2) ? 'color:red;' : ''}">${data.obtenu}</td>
                    <td style="padding:8px; border:1px solid #ddd; text-align:center; color:#666;">/ ${data.max}</td>
                </tr>`;
            // Ajoute une ligne HTML pour cette matière avec le nom, les points obtenus (en rouge si < 50%) et le max
        }

        const pct = totalMaxGeneral > 0 ? ((totalObtenu / totalMaxGeneral) * 100).toFixed(1) : 0;
        // Calcule le pourcentage global (1 décimale) ou 0 si le total max est nul

        html += `
                    </tbody>
                </table>

                <div style="margin-top:20px; padding:15px; background:#f9f9f9; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid #ddd;">
                    <div>
                        <div style="font-size:1.1em; color: BLACK; font-weight:bold;">PLACE : ${maPlace > 0 ? maPlace : '-'} /${classements.length}</div>
                    </div>
                    <div style="text-align:right;">
                        <p style="margin:2px 0;"><strong>TOTAL :</strong> ${totalObtenu} / ${totalMaxGeneral}</p>
                        <p style="margin:2px 0; font-size:1.3em; color:black;"><strong>POURC :</strong> ${pct}%</p>
                    </div>
                </div>
            </div>`;
        // Finalise le HTML du bulletin avec le rang, le total et le pourcentage
        
        container.innerHTML = html;
        // Injecte le HTML du bulletin généré dans le conteneur de la page
    }

    async function verifierEvaluations(uid, maClasse) {
        try {
            // 1. Récupérer tous les enseignants
            const snapUsers = await getDocs(collection(db, "users"));
            const snapUtils = await getDocs(collection(db, "utilisateurs"));

            const profsMap = new Map();
            const addIfProf = (docSnap) => {
                const data = docSnap.data();
                if (!data) return;
                const r = String(data.role || "").toLowerCase();
                if (r === "enseignant" || r.includes("prof") || r.includes("teacher")) {
                    const nomClean = (data.nom || "").trim();
                    if (nomClean && !profsMap.has(normNom(nomClean))) {
                        profsMap.set(normNom(nomClean), docSnap.id);
                    }
                }
            };

            snapUsers.forEach(addIfProf);
            snapUtils.forEach(addIfProf);

            const totalProfs = profsMap.size;
            if (totalProfs === 0) return true; // Aucun enseignant -> accès libre

            // 2. Récupérer les évaluations soumises par cet élève
            const qEvals = query(collection(db, "evaluations_profs"), where("eleveId", "==", uid));
            const snapEvals = await getDocs(qEvals);

            const evaluedIds = new Set();
            const evaluedNorms = new Set();

            snapEvals.forEach(d => {
                const data = d.data();
                if (data.profId) evaluedIds.add(data.profId);
                if (data.profNom) evaluedNorms.add(normNom(data.profNom));
                if (data.profNomNorm) evaluedNorms.add(data.profNomNorm);
            });

            // 3. Vérifier la couverture des évaluations
            let countEvalues = 0;
            profsMap.forEach((profId, profNorm) => {
                if (evaluedIds.has(profId) || evaluedNorms.has(profNorm)) {
                    countEvalues++;
                }
            });

            return countEvalues >= totalProfs;
        } catch (e) {
            console.error("Erreur verifierEvaluations:", e);
            return true;
        }
    }

    function normClasse(s) {
        if (!s) return "";
        let str = String(s).trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        str = str.replace(/^(\d+)(er|ere|erè|è|eme|emè|em|ème)?\s*/i, "$1 ");
        return str.replace(/[^a-z0-9]/g, "");
    }

    onAuthStateChanged(auth, async (user) => {
        // Écoute les changements d'état de connexion
        if (!user) { window.location.href = "login.html"; return; }
        
        const container = document.getElementById('liste-notes');
        const tabs = document.getElementById('tabs-section');

        try {
            // 1. Charger le profil fusionné de l'élève
            const profil = await lireProfilFusionne(user.uid);
            if (!profil.ok) {
                container.innerHTML = "<p style='text-align:center; color:red; padding:20px;'>Profil introuvable dans la base de données.</p>";
                return;
            }

            // 2. Vérifier les évaluations profs
            const evaluationsTerminees = await verifierEvaluations(user.uid, profil.maClasse);
            if (!evaluationsTerminees) {
                container.innerHTML = `<div class="message-verrouillage"><div class="icone-verrou">🔒</div><h3>Accès restreint</h3><p>Évaluez vos professeurs pour voir vos points.</p><a href="CoterE.html" class="btn-action">Évaluer</a></div>`;
                return;
            }

            tabs.style.display = "flex";
            
            // 3. Récupérer TOUTES les notes depuis Firestore (sans filtre restrictif en requête SQL/Firestore)
            const snapNotes = await getDocs(collection(db, "notes"));

            toutesMesNotes = [];
            window.toutesNotesClasse = [];

            snapNotes.forEach((snap) => {
                const data = snap.data();
                if (!data) return;

                const noteNomNorm = normNom(data.nomEleveNorm || data.nomEleve);
                const noteClasseNorm = normClasse(data.classe);

                // Correspondance de l'élève par son nom (fiabilité 100%)
                if (noteNomNorm === profil.monNomNorm && noteNomNorm !== "") {
                    toutesMesNotes.push(data);
                }

                // Correspondance de la classe pour le calcul du rang
                if (noteClasseNorm === normClasse(profil.maClasse) && profil.maClasse !== "") {
                    window.toutesNotesClasse.push(data);
                }
            });

            // 4. Si aucune note en 1ère Période mais des notes dans d'autres périodes, ajuster l'onglet par défaut
            if (toutesMesNotes.length > 0) {
                const periodesPresentes = Array.from(new Set(toutesMesNotes.map(n => n.periode).filter(Boolean)));
                if (!periodesPresentes.includes(periodeSelectionnee) && periodesPresentes.length > 0) {
                    periodeSelectionnee = periodesPresentes[0];
                    // Mettre en surbrillance le bon onglet
                    document.querySelectorAll('.btn-onglet').forEach(b => {
                        if (b.innerText.trim().toLowerCase().includes(periodeSelectionnee.toLowerCase().slice(0, 4))) {
                            b.classList.add('active');
                        } else {
                            b.classList.remove('active');
                        }
                    });
                }
            }

            window.monProfilEleve = profil;
            await afficherNotesFiltrees();

        } catch (error) {
            console.error("Erreur chargement MesCotes:", error);
            container.innerHTML = "<p style='text-align:center; color:red; padding:20px;'>Erreur lors du chargement des notes.</p>";
        }
    });

    async function lireProfilFusionne(uid) {
        try {
            const snapUsers = await getDoc(doc(db, "users", uid));
            const snapUtils = await getDoc(doc(db, "utilisateurs", uid));
            
            const u = snapUsers.exists() ? snapUsers.data() : {};
            const v = snapUtils.exists() ? snapUtils.data() : {};

            let classeRaw = u.classe || v.classe || u.maClasse || v.maClasse || "";
            if (Array.isArray(classeRaw)) classeRaw = classeRaw[0] || "";

            const nomRaw = u.nom || v.nom || u.name || v.name || "";

            return { 
                ok: snapUsers.exists() || snapUtils.exists(),
                nomOriginal: nomRaw,
                maClasse: String(classeRaw).trim(), 
                monNomNorm: normNom(nomRaw) 
            };
        } catch (e) { return { ok: false }; }
    }
    // --- SÉCURITÉ : ANTI-INSPECTION ---
    // Bloquer le clic droit
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    // Empêche l'ouverture du menu contextuel (clic droit) sur toute la page

    // Bloquer les raccourcis clavier (F12, Ctrl+U, Ctrl+Shift+I, etc.)
    document.addEventListener('keydown', (e) => {
        // Écoute chaque touche pressée sur le clavier pour intercepter les raccourcis de développeur
        if (
            e.key === 'F12' || 
            // Vérifie si la touche F12 (ouvre les DevTools) est pressée
            (e.ctrlKey && e.shiftKey && e.key === 'I') || 
            // Vérifie la combinaison Ctrl+Shift+I (ouvre les DevTools)
            (e.ctrlKey && e.shiftKey && e.key === 'J') || 
            // Vérifie la combinaison Ctrl+Shift+J (ouvre la console)
            (e.ctrlKey && e.key === 'u') ||
            // Vérifie Ctrl+U (affiche le code source)
            (e.ctrlKey && e.key === 's')
            // Vérifie Ctrl+S (sauvegarde de la page)
        ) {
            e.preventDefault();
            // Annule l'action par défaut du raccourci clavier détecté
            alert("L'inspection du code est désactivée pour des raisons de sécurité.");
            // Affiche un message expliquant pourquoi l'action est bloquée
            return false;
            // Retourne false pour s'assurer que l'événement est complètement stoppé
        }
    });

</script>
