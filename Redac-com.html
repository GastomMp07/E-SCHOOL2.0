<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rédaction Communiqué - CS MAXEL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>

    <style>
        body {
            background: linear-gradient(135deg, #000000 0%, #cc0000 100%) no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            display: block;
        }
        /* On élargit la carte spécifiquement pour le tableau des notes */
        .welcome-card {
            max-width: 1000px; 
            width: 95%;
            margin-bottom: 40px;
        }
        /* Suppression du reste du CSS local car il est déjà dans style.css */
        .note-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
            border-left: 5px solid #cc0000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .note-matiere {
            font-weight: bold;
            font-size: 1.1em;
            color: #cc0000;
            display: block;
            margin-bottom: 10px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
            text-transform: uppercase;
        }
        .note-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .stat-item { display: flex; flex-direction: column; }
        .stat-label { color: #666; font-size: 0.85em; }
        .stat-value { font-weight: bold; color: #333; font-size: 0.95em; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>
            <div style="font-weight: bold; font-size: 1.2em;">CS MAXEL</div>
        </div>
    
        <img src="images/image_copy.png" alt="logo.png" class="header-logo">
    </div>
    
        <div id="sidebar" class="sidebar">
        <h2>Menu</h2>
        <a href="accueil.html">Accueil</a>
    
    <a href="comunique.html">Communiqués</a>
    <a href="horaire.html">Horaire</a>
    <a href="profil.html" id="menu-profil" style="display:none;">Mon Profil</a>

    <a href="MesCotes.html" id="menu-eleve-notes" style="display:none;">Mes Cotes</a>

    <a href="CoterE.html" id="menu-eleve-coter" style="display:none;">Coter les Enseigant</a>
    
    <a href="Saisir-note.html" id="menu-prof-saisie-notes" style="display:none;">Saisir les notes</a>
    
    <a href="javascript:void(0)" onclick="ouvrirGestionEcole()" id="menu-Enseignant" style="display:none;">Supervision Direction</a>

    <a href="Redac-com.html" id="menu-prof-communiquer" style="display:none;">Rédaction du communiquer</a>

    <a href="Appel.html" id="menu-prof-appel" style="display:none;">Faire l'Appel</a>

    
        <button onclick="logout()" class="logout-btn">Se déconnecter</button>
    </div>
        <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <div class="main-content">
        <div class="welcome-card animate__animated animate__fadeIn">
            <h2>📢 Publier un Communiqué</h2>
            <p>Ce message sera visible par tous les élèves et enseignants de l'école.</p>

            <div class="data-card">
                <form id="form-redac" style="display: flex; flex-direction: column; gap: 15px; text-align: left;">
                    
                    <div>
                        <label for="titre-com" style="display: block; margin-bottom: 5px; font-weight: bold;">Titre de l'annonce :</label>
                        <input type="text" id="titre-com" placeholder="Ex: Réunion des parents ou Congé" required 
                               style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;">
                    </div>

                    <div>
                        <label for="message-com" style="display: block; margin-bottom: 5px; font-weight: bold;">Message :</label>
                        <textarea id="message-com" rows="6" placeholder="Écrivez votre communiqué ici..." required 
                                  style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; box-sizing: border-box; resize: vertical;"></textarea>
                    </div>

                    <div>
                        <label for="com-cible" style="display: block; margin-bottom: 5px; font-weight: bold;">Destinataire :</label>
                        <select id="com-cible" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px;">
                                <option value="">--Toutes les classes--</option>
                                <option value="7em A">7em A</option>
                                <option value="7em B">7em B</option>
                                <option value="8em A">8em A</option>
                                <option value="8em B">8em B</option>
                                <option value="1erè SCIENCES">1erè SCIENCES</option>
                                <option value="1erè COMMERCIAL">1erè COMMERCIAL</option>
                                <option value="1erè LITTERAIRE">1erè LITTERAIRE</option>
                                <option value="1erè PEDAGOGIE">1erè PEDAGOGIE</option>
                                <option value="1erè ELECTRONIQUE">1erè ELECTRONIQUE</option>
                                <option value="1erè ELECTRICITE">1erè ELECTRICITE</option>
                                <option value="2emè SCIENCES">2emè SCIENCES</option>
                                <option value="2emè COMMERCIAL">2emè COMMERCIAL</option>
                                <option value="2emè LITTERAIRE">2emè LITTERAIRE</option>
                                <option value="2emè PEDAGOGIE">2emè PEDAGOGIE</option>
                                <option value="2emè ELECTRONIQUE">2emè ELECTRONIQUE</option>
                                <option value="2emè ELECTRICITE">2emè ELECTRICITE</option>
                                <option value="3emè SCIENCES">3emè SCIENCES</option>
                                <option value="3emè COMMERCIAL">3emè COMMERCIAL</option>
                                <option value="3emè LITTERAIRE">3emè LITTERAIRE</option>
                                <option value="3emè PEDAGOGIE">3emè PEDAGOGIE</option>
                                <option value="3emè ELECTRONIQUE">3emè ELECTRONIQUE</option>
                                <option value="3emè ELECTRICITE">3emè ELECTRICITE</option>
                                <option value="4emè SCIENCES">4emè SCIENCES</option>
                                <option value="4emè COMMERCIAL">4emè COMMERCIAL</option>
                                <option value="4emè LITTERAIRE">4emè LITTERAIRE</option>
                                <option value="4emè PEDAGOGIE">4emè PEDAGOGIE</option>
                                <option value="4emè ELECTRONIQUE">4emè ELECTRONIQUE</option>
                                <option value="4emè ELECTRICITE">4emè ELECTRICITE</option>
                        </select>
                    </div>

                    

                    <button type="submit" class="register-btn" style="background: #cc0000; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px;">
                        Publier l'annonce
                    </button>
                    
                </form>
            </div>
        </div>
    </div>
   

    <script type="module">
        import { db, auth } from "./auth.js";
        import { collection, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let nomAuteur = "Un Enseignant";

        // 1. Récupérer les infos de l'utilisateur connecté pour l'auteur
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // Cherche dans "users" ou "utilisateurs"
                    let userSnap = await getDoc(doc(db, "users", user.uid));
                    if (!userSnap.exists()) {
                        userSnap = await getDoc(doc(db, "utilisateurs", user.uid));
                    }

                    if (userSnap.exists()) {
                        nomAuteur = userSnap.data().nom;
                    }
                } catch (error) {
                    console.error("Erreur de récupération profil:", error);
                }
            } else {
                // Rediriger si pas connecté
                window.location.href = "login.html";
            }
        });

        // 2. Gestion du formulaire
        const formRedac = document.getElementById('form-redac');
        formRedac.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const titre = document.getElementById('titre-com').value;
            const contenu = document.getElementById('message-com').value;
            const cible = document.getElementById('com-cible').value;

            try {
                await addDoc(collection(db, "communiques"), {
                    titre: titre,
                    message: contenu,
                    destinataire: cible,
                    timestamp: Date.now(),
                    date: new Date(),
                    auteur: nomAuteur
                });
                alert("✅ Communiqué publié avec succès !");
                formRedac.reset();
            } catch (error) {
                alert("Erreur lors de la publication : " + error.message);
            }
        });
        // --- SÉCURITÉ : ANTI-INSPECTION ---
// Bloquer le clic droit
document.addEventListener('contextmenu', (e) => e.preventDefault());

// Bloquer les raccourcis clavier (F12, Ctrl+U, Ctrl+Shift+I, etc.)
document.addEventListener('keydown', (e) => {
    if (
        e.key === 'F12' || 
        (e.ctrlKey && e.shiftKey && e.key === 'I') || 
        (e.ctrlKey && e.shiftKey && e.key === 'J') || 
        (e.ctrlKey && e.key === 'u') ||
        (e.ctrlKey && e.key === 's')
    ) {
        e.preventDefault();
        alert("L'inspection du code est désactivée pour des raisons de sécurité.");
        return false;
    }
});
    </script>

    <script type="module" src="app.js"></script>

</body>
</html>
