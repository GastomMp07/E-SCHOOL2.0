<body>

    <style>
        body {
            background: linear-gradient(135deg, #071e2b 0%, #0c7489 100%) no-repeat;

            width: 80%;
            margin-bottom: 30px;
        }
        /* Suppression du reste du CSS local car il est déjà dans style.css */

            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: left;
            border-left: 5px solid #0c5568;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .matiere-note {
            font-weight: bold;
            font-size: 1.1em;
            color: #0c5568;
            display: block;
            margin-bottom: 10px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
            text-transform: uppercase;
        }
        .grille-stats-note {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .element-statistique { display: flex; flex-direction: column; }
        .libelle-stat { color: #666; font-size: 0.85em; }
        .valeur-stat { font-weight: bold; color: #333; font-size: 0.95em; 
        }
        .btn-inscription{
            background: #0d3b4f;
            color: white;
            border: none;
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="en-tete">
        <div class="en-tete-gauche">
            <div class="btn-menu" onclick="toggleMenu()">☰</div>
            <div style="font-weight: bold; font-size: 1.2em;">E-SCHOOL</div>
        </div>
    
        <img src="images/image.png" alt="E-SCHOOL logo" class="logo-en-tete">
    </div>
    
        <div id="sidebar" class="barre-laterale">
        <h2>Menu</h2>
       <a href="accueil.html">Accueil</a>
    
    <a href="comunique.html">Communiqués</a>
    <a href="horaire.html">Horaire</a>

    <a href="CoterE.html" id="menu-eleve-coter" style="display:none;">Coter les Enseigant</a>
    
    <a href="Saisir-note.html" id="menu-prof-saisie-notes" style="display:none;">Saisir les notes</a>

    <a href="Appel.html" id="menu-prof-appel" style="display:none;">Faire l'Appel</a>

    
        <button onclick="logout()" class="btn-deconnexion">Se déconnecter</button>
    </div>
        <div id="overlay" class="voile" onclick="toggleMenu()"></div>

    <div class="contenu-principal">
        <div class="carte-accueil">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">📝 Registre de Présence</h2>
                <select id="select-classe-appel" style="padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-family: inherit; font-size: 14px;">
                    <option value="">-- Choisir la classe --</option>
                </select>
            </div>
            <div class="carte-donnees">
                <table style="width: 100%; text-align: left;">
                    <thead>
                        <tr>
                            <th>Nom de l'élève</th>
                            <th>Présent</th>
                        </tr>
                    </thead>
                    <tbody id="liste-appel">
                        </tbody>
                </table>
                <button onclick="enregistrerAppel()" class="btn-inscription" style="margin-top:20px;">Valider l'appel du jour</button>
            </div>
        </div>
    </div>
    <!-- Inclusion du script principal pour gérer le menu et les rôles -->
    <script type="module" src="app.js"></script>

    <script type="module">
        import { db, auth } from "./auth.js";
        // Importe les instances de la base de données et de l'authentification depuis auth.js
        import { collection, query, where, getDocs, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        // Importe les fonctions Firestore nécessaires pour requêter et manipuler des documents
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        // Importe l'écouteur de changement d'état de connexion de Firebase Auth
        
        let maClasse = "";
        // Déclare une variable globale pour stocker la classe sélectionnée pour l'appel
        const selectClasse = document.getElementById('select-classe-appel');
        // Récupère l'élément HTML du sélecteur de classe
        const tbody = document.getElementById('liste-appel');
        // Récupère le corps du tableau HTML destiné à lister les élèves pour l'appel

        onAuthStateChanged(auth, async (user) => {
            // Écoute les changements d'état de connexion de l'utilisateur
            if (user) {
                // Si l'utilisateur est bien connecté
                // 1. Récupérer le profil pour connaître les classes autorisées
                const snapProf = await getDoc(doc(db, "users", user.uid));
                // Récupère le document utilisateur de l'enseignant ou de l'admin
                if (!snapProf.exists()) return;
                // Si le profil n'existe pas, arrête l'exécution
                
                const dataProf = snapProf.data();
                // Extrait les données du document profil
                let listeClasses = [];
                // Initialise la liste des classes gérées

                // Si admin, on propose toutes les classes, sinon les classes du prof
                if (dataProf.classe === "Toutes") {
                    // Si l'utilisateur a accès à toutes les classes (admin/direction)
                     listeClasses = [
                       "7emè A",
                        "7emè B",
                        "8emè A", 
                        "8emè B", 
                        "1erè SCIENCES",
                        "1erè COMMERCIAL", 
                        "1erè LITTERAIRE",
                        "1erè PEDAGOGIE",
                        "1emè ELECTRONIQUE",
                        "1erè ELECTRICITE",
                        "2emè SCIENCES",
                        "2emè COMMERCIAL",
                        "2emè LITTERAIRE",
                        "2emè PEDAGOGIE",
                        "2emè ELECTRONIQUE",
                        "2emè ELECTRICITE",
                        "3emè SCIENCES",
                        "3emè COMMERCIAL",
                        "3emè LITTERAIRE",
                        "3emè PEDAGOGIE",
                        "3emè ELECTRONIQUE",
                        "3emè ELECTRICITE",
                        "4emè SCIENCES",
                        "4emè COMMERCIAL",
                        "4emè LITTERAIRE",
                        "4emè PEDAGOGIE",
                        "4emè ELECTRONIQUE",
                        "4emè ELECTRICITE"
                    ];
                    // Définit le tableau de toutes les classes existantes dans l'établissement

                } else if (Array.isArray(dataProf.classe)) {
                    // Si la propriété classe du professeur est déjà un tableau
                    listeClasses = dataProf.classe;
                    // Assigne directement ce tableau à la liste des classes gérées
                } else {
                    // Sinon, si c'est une chaîne de caractères simple
                    listeClasses = [dataProf.classe];
                    // Enveloppe la valeur unique dans un tableau pour uniformiser le traitement
                }

                // 2. Remplir le menu déroulant
                selectClasse.innerHTML = '<option value="">-- Sélectionner une classe --</option>';
                // Réinitialise le sélecteur de classe avec l'option par défaut
                listeClasses.forEach(cl => {
                    // Parcourt chaque classe autorisée pour créer l'option correspondante
                    const opt = document.createElement('option');
                    // Crée un nouvel élément d'option HTML
                    opt.value = cl;
                    // Attribue la classe comme valeur de l'option
                    opt.textContent = cl;
                    // Définit le texte affiché pour cette option
                    selectClasse.appendChild(opt);
                    // Ajoute l'option dans le menu déroulant
                });

                // Sélectionner la première classe par défaut
                if (listeClasses.length > 0) {
                    // S'il y a au moins une classe disponible
                    selectClasse.value = listeClasses[0];
                    // Sélectionne automatiquement la première classe de la liste
                    maClasse = listeClasses[0];
                    // Met à jour la variable globale de classe courante
                    chargerEleves(maClasse);
                    // Déclenche le chargement des élèves de cette classe par défaut
                }
            }
        });

        selectClasse.addEventListener('change', (e) => {
            // Écoute les changements de sélection du menu déroulant des classes
            maClasse = e.target.value;
            // Met à jour la variable globale avec la classe nouvellement sélectionnée
            if (maClasse) chargerEleves(maClasse);
            // Charge la liste des élèves si une classe valide est sélectionnée
        });

        async function chargerEleves(classeCible) {
            // Déclare la fonction asynchrone pour lister les élèves de la classe cible
            tbody.innerHTML = "<tr><td colspan='2'>Chargement des élèves...</td></tr>";
            // Affiche un message d'attente dans le tableau durant la récupération des données
            
            // CRUCIAL : On utilise "array-contains" car le champ 'classe' de l'élève est un tableau
            const qEleves = query(collection(db, "users"), 
                // Prépare une requête Firestore sur la collection "users"
                where("role", "==", "eleve"), 
                // Filtre les utilisateurs ayant le rôle "eleve"
                where("classe", "array-contains", classeCible)
                // Filtre ceux dont le tableau des classes contient la classe cible
            );
            
            const snapEleves = await getDocs(qEleves);
            // Récupère les documents correspondant à la requête
            tbody.innerHTML = "";
            // Vide le tableau des élèves avant de l'alimenter
            
            if (snapEleves.empty) {
                // Si aucun élève n'a été trouvé pour cette classe
                tbody.innerHTML = "<tr><td colspan='2'>Aucun élève trouvé pour cette classe.</td></tr>";
                // Affiche un message informant qu'aucun élève n'est présent dans la classe
                return;
                // Arrête l'exécution de la fonction
            }

            snapEleves.forEach(docEleve => {
                // Parcourt chaque document d'élève trouvé
                const eleve = docEleve.data();
                // Extrait les données de l'élève
                tbody.innerHTML += `
                    <tr>
                        <td>${eleve.nom}</td>
                        <td><input type="checkbox" class="presence-check" data-nom="${eleve.nom}" checked></td>
                    </tr>`;
                // Ajoute une ligne dans le tableau avec le nom de l'élève et une case à cocher cochée par défaut
            });
        }

        window.enregistrerAppel = async () => {
            // Expose globalement la fonction asynchrone de validation de l'appel pour le bouton HTML
            const checks = document.querySelectorAll('.presence-check');
            // Récupère toutes les cases à cocher de présence du tableau
            const maintenant = new Date();
            // Crée un objet Date représentant le moment présent
            // Format local pour l'affichage (ex: 18/04/2026)
            const dateJour = maintenant.toLocaleDateString('fr-FR'); 
            // Formate la date du jour en version française (JJ/MM/AAAA)

            try {
                // Bloc try pour capturer les erreurs de réseau ou de base de données
                for (let check of checks) {
                    // Parcourt chaque case à cocher pour enregistrer le statut de l'élève
                    await addDoc(collection(db, "presences"), {
                        // Enregistre un nouveau document de présence dans Firestore
                        nomEleve: check.dataset.nom,
                        // Récupère le nom de l'élève stocké dans l'attribut de données data-nom
                        classe: maClasse,
                        // Enregistre la classe sélectionnée lors de l'appel
                        statut: check.checked ? "Présent" : "Absent",
                        // Indique "Présent" si la case est cochée, sinon "Absent"
                        date: dateJour, 
                        // Enregistre la date au format texte français
                        timestamp: maintenant // Gardé pour le tri
                        // Enregistre la date exacte de soumission pour le tri ultérieur
                    });
                }
                alert("✅ Appel enregistré pour le " + dateJour);
                // Affiche une alerte confirmant que l'appel a bien été enregistré
            } catch (e) {
                // Si l'enregistrement Firestore échoue
                alert("Erreur lors de l'enregistrement");
                // Affiche une boîte de dialogue pour signaler l'erreur de validation
            }
        };
        // --- SÉCURITÉ : ANTI-INSPECTION ---
        // Bloquer le clic droit
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        // Empêche l'ouverture du menu contextuel (clic droit) sur toute la page

        // Bloquer les raccourcis clavier (F12, Ctrl+U, Ctrl+Shift+I, etc.)
        document.addEventListener('keydown', (e) => {
            // Écoute chaque touche pressée sur le clavier pour intercepter les raccourcis de développeur
            if (
                e.key === 'F12' || 
                // Vérifie si la touche F12 (ouvre les DevTools) est pressée
                (e.ctrlKey && e.shiftKey && e.key === 'I') || 
                // Vérifie la combinaison Ctrl+Shift+I (ouvre les DevTools)
                (e.ctrlKey && e.shiftKey && e.key === 'J') || 
                // Vérifie la combinaison Ctrl+Shift+J (ouvre la console)
                (e.ctrlKey && e.key === 'u') ||
                // Vérifie Ctrl+U (affiche le code source)
                (e.ctrlKey && e.key === 's')
                // Vérifie Ctrl+S (sauvegarde de la page)
            ) {
                e.preventDefault();
                // Annule l'action par défaut du raccourci clavier détecté
                alert("L'inspection du code est désactivée pour des raisons de sécurité.");
                // Affiche un message expliquant pourquoi l'action est bloquée
                return false;
                // Retourne false pour s'assurer que l'événement est complètement stoppé
            }
        });

    </script>
</body>
</html>
