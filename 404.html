<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable - E-SCHOOL</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #071e2b 0%, #0c7489 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #2d3436;
        }
        .conteneur {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h1 {
            font-size: 72px;
            margin: 0;
            color: #0c5568;
        }
        h2 {
            margin: 10px 0;
            font-weight: 600;
        }
        p {
            color: #636e72;
            margin-bottom: 30px;
        }
        .btn-action {
            display: inline-block;
            background: #0c5568;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            font-weight: bold;
        }
        .btn-action:hover {
            background: #0a3d52;
        }
    </style>
</head>
<body>
    <div class="conteneur">
        <h1>404</h1>
        <h2>Oups ! Page perdue</h2>
        <p>Désolé, la page que vous recherchez n'existe pas ou a été déplacée.</p>
        <a href="login.html" class="btn-action">Retour à la connexion</a>
    </div>
</body>
</html>
